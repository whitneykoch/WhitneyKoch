<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>Clean Blog - Start Bootstrap Theme</title>
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <!-- Font Awesome icons (free version)-->
        <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
        <!-- Google fonts-->
        <link href="https://fonts.googleapis.com/css?family=Lora:400,700,400italic,700italic" rel="stylesheet" type="text/css" />
        <link href="https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800" rel="stylesheet" type="text/css" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="css/styles.css" rel="stylesheet" />
    </head>
<meta charset="UTF-8">
<title>Mini Wordle</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #121213;
    color: white;
  }

  h1 { margin-top: 20px; }

  #grid {
    display: grid;
    grid-template-columns: repeat(5, 60px);
    gap: 8px;
    justify-content: center;
    margin: 20px;
  }

  .cell {
    width: 60px;
    height: 60px;
    border: 2px solid #3a3a3c;
    font-size: 2rem;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .correct { background: #538d4e; }
  .present { background: #b59f3b; }
  .absent { background: #3a3a3c; }

  #keyboard {
    margin-top: 20px;
  }

  .key {
    padding: 10px;
    margin: 3px;
    background: #818384;
    display: inline-block;
    border-radius: 4px;
    cursor: pointer;
  }

  #message {
    font-size: 1.5rem;
    margin-top: 15px;
  }

  #playAgain {
    display: none;
    margin-top: 15px;
    padding: 10px 20px;
    font-size: 1rem;
    background: #538d4e;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
  }
</style>
</head>
<body>

<h1>Whitney's Wordle</h1>
<div id="grid"></div>
<div id="keyboard"></div>
<div id="message"></div>
<button id="playAgain">Play Again</button>
<canvas id="confetti"></canvas>

<script>
const WORDS = ["apple","grape","train","flame","chair","stone"];
let TARGET;
let currentRow;
let currentCol;
let guesses;
let confettiInterval;

const grid = document.getElementById("grid");
const message = document.getElementById("message");
const playAgainBtn = document.getElementById("playAgain");

// Create keyboard ONCE
const keys = "QWERTYUIOPASDFGHJKLZXCVBNM".split("");
const keyboard = document.getElementById("keyboard");

keys.forEach(k => {
  const key = document.createElement("span");
  key.textContent = k;
  key.className = "key";
  key.onclick = () => handleKey(k);
  keyboard.appendChild(key);
});

// Initialize / Reset Game
function initGame() {
  TARGET = WORDS[Math.floor(Math.random() * WORDS.length)];
  currentRow = 0;
  currentCol = 0;
  guesses = Array.from({length: 5}, () => Array(5).fill(""));

  message.textContent = "";
  playAgainBtn.style.display = "none";

  grid.innerHTML = "";
  for (let i = 0; i < 25; i++) {
    const div = document.createElement("div");
    div.classList.add("cell");
    grid.appendChild(div);
  }

  stopConfetti();
}

initGame();

function handleKey(letter) {
  if (currentCol < 5 && currentRow < 5) {
    guesses[currentRow][currentCol] = letter.toLowerCase();
    updateGrid();
    currentCol++;
  }
}

document.addEventListener("keydown", e => {
  if (e.key === "Enter") submitGuess();
  else if (e.key === "Backspace") {
    if (currentCol > 0) {
      currentCol--;
      guesses[currentRow][currentCol] = "";
      updateGrid();
    }
  } else if (/^[a-zA-Z]$/.test(e.key)) {
    handleKey(e.key.toUpperCase());
  }
});

function updateGrid() {
  const cells = document.querySelectorAll(".cell");
  guesses.flat().forEach((letter, i) => {
    cells[i].textContent = letter.toUpperCase();
  });
}

function submitGuess() {
  if (currentCol < 5) return;

  const guess = guesses[currentRow].join("");
  const cells = document.querySelectorAll(".cell");

  for (let i = 0; i < 5; i++) {
    const cell = cells[currentRow * 5 + i];
    const letter = guess[i];

    if (TARGET[i] === letter) {
      cell.classList.add("correct");
    } else if (TARGET.includes(letter)) {
      cell.classList.add("present");
    } else {
      cell.classList.add("absent");
    }
  }

  if (guess === TARGET) {
    message.textContent = "You Win! 🎉";
    endGame(true);
    return;
  }

  currentRow++;
  currentCol = 0;

  if (currentRow === 5) {
    message.textContent = "You Lose! The word was: " + TARGET;
    endGame(false);
  }
}

function endGame(won) {
  playAgainBtn.style.display = "inline-block";
  if (won) startCelebration();
}

// Play Again Button
playAgainBtn.onclick = () => {
  initGame();
};

// 🎉 Confetti + Balloons
function startCelebration() {
  const canvas = document.getElementById("confetti");
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const pieces = Array.from({length: 150}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 6 + 4,
    d: Math.random() * 50,
    color: `hsl(${Math.random()*360},100%,50%)`
  }));

  confettiInterval = setInterval(() => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    pieces.forEach(p => {
      ctx.beginPath();
      ctx.fillStyle = p.color;
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();

      p.y += 2;
      if (p.y > canvas.height) p.y = 0;
    });
  }, 20);

  // Balloons
  for (let i = 0; i < 10; i++) {
    let balloon = document.createElement("div");
    balloon.style.position = "fixed";
    balloon.style.bottom = "-100px";
    balloon.style.left = Math.random() * 100 + "%";
    balloon.style.width = "40px";
    balloon.style.height = "60px";
    balloon.style.background = `hsl(${Math.random()*360},100%,60%)`;
    balloon.style.borderRadius = "50%";
    balloon.style.animation = "floatUp 5s linear forwards";

    document.body.appendChild(balloon);
  }
}

function stopConfetti() {
  const canvas = document.getElementById("confetti");
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  clearInterval(confettiInterval);
}

// Balloon animation
const style = document.createElement("style");
style.innerHTML = `
@keyframes floatUp {
  to {
    transform: translateY(-120vh);
  }
}`;
document.head.appendChild(style);

</script>

</body>
</html>
